# Production override — uses pre-built images, no volume mounts
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod --profile infra up -d

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  neo4j:
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-}

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-gcc-decision-intelligence-platform}/backend:latest
    profiles: ["prod"]
    env_file: .env.prod
    volumes: []
    environment:
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=warning
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4.0"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-gcc-decision-intelligence-platform}/frontend:latest
    profiles: ["prod"]
    env_file: .env.prod
    volumes: []
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
