services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: gcc-postgres
    profiles: ["dev", "prod", "infra"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gcc_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-gcc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gcc_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  neo4j:
    image: neo4j:5.18-community
    container_name: gcc-neo4j
    profiles: ["dev", "prod", "infra"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: gcc-redis
    profiles: ["dev", "prod", "infra"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: gcc-backend
    profiles: ["dev"]
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/src
      - ./packages/shared-schemas:/app/shared-schemas
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: gcc-frontend
    profiles: ["dev"]
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/src:/app/src
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

volumes:
  pgdata:
  neo4jdata:
  redisdata:
